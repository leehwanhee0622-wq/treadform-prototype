<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="TreadForm" />
<title>TreadForm v2 · 트레드밀 자세 분석</title>
<link rel="manifest" href="./treadform.webmanifest" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<style>
  /* ──────────────────────────────────────────────────────────────
     COLOR SYSTEM — light base, defined ONCE.
     Every downstream value reads via var(--c-*). No stray hex.
     Asymmetry signal pair (12% L/R warning) is NOT modeled — the
     v2 product scope excludes 좌·우 비대칭 entirely.
  ─────────────────────────────────────────────────────────────── */
  :root {
    --c-bg:          #FFFFFF;
    --c-s1:          #F8FAFC;
    --c-s2:          #F1F5F9;
    --c-text:        #0F172A;
    --c-text-2: rgba(15,23,42,0.65);
    --c-text-3: rgba(15,23,42,0.45);
    --c-text-m: rgba(15,23,42,0.55);
    --c-bd:     rgba(15,23,42,0.08);
    --c-bd-s:   rgba(15,23,42,0.15);

    --c-primary:        #00C2FF;
    --c-primary-dark:   #0098C7;
    --c-primary-subtle: #E0F7FE;

    /* Signal — reserved for posture verdicts ONLY */
    --c-success: #10B981;
    --c-warn:    #F59E0B;
    --c-danger:  #EF4444;
    --c-success-bg: #D1FAE5;
    --c-warn-bg:    #FEF3C7;
    --c-danger-bg:  #FEE2E2;

    /* Outer stage uses the approved text token to frame the light phone. */
    --c-stage: #0F172A;

    /* Dark capture screens still use only the approved palette. */
    --c-cam-text-1: #FFFFFF;
    --c-cam-text-2: #F8FAFC;
    --c-cam-text-3: #F1F5F9;
    --c-cam-bd:     #F1F5F9;

    --shadow-phone: 0 20px 40px rgba(15,23,42,0.15), 0 0 0 1px rgba(15,23,42,0.15);
    --shadow-press: 0 2px 8px rgba(15,23,42,0.08);

    --font: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
  }

  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--c-stage); }
  body { font-family: var(--font); color: var(--c-text);
         -webkit-font-smoothing: antialiased; overflow: hidden;
         font-feature-settings: 'tnum' 1; }

  #root { width: 100vw; height: 100vh;
          display: flex; align-items: center; justify-content: center; }

  /* Hide native scrollbars on the recent-measurement carousel */
  .scroll-x { -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .scroll-x::-webkit-scrollbar { display: none; }

  /* Splash loader — 3 cyan dots pulsing in sequence */
  @keyframes pulseDot { 0%,70%,100% { opacity: 0.35; } 35% { opacity: 1; } }
  /* Joint dots wake up in sequence on splash mount */
  @keyframes nameSlideIn { 0% { opacity: 0; transform: translateY(6px); }
                          100% { opacity: 1; transform: translateY(0); } }
  @keyframes jointPop { 0% { opacity: 0; transform: scale(0.4); }
                       60% { opacity: 1; transform: scale(1.15); }
                       100% { opacity: 1; transform: scale(1); } }
  @keyframes buddyBob { 0%,100% { transform: translateY(0) rotate(-2deg); }
                       50% { transform: translateY(-7px) rotate(2deg); } }
  @keyframes buddyLegA { 0%,100% { transform: rotate(24deg); }
                        50% { transform: rotate(-30deg); } }
  @keyframes buddyLegB { 0%,100% { transform: rotate(-30deg); }
                        50% { transform: rotate(24deg); } }
  @keyframes beltDash { from { background-position-x: 0; }
                       to { background-position-x: -34px; } }
  @keyframes sweatPop { 0% { opacity: 0; transform: translate(0, 3px) scale(0.6); }
                       35% { opacity: 1; }
                       100% { opacity: 0; transform: translate(12px, -14px) scale(1); } }
</style>
</head>

/* ══════════════════════════════════════════════════════════════
   Stage — letterboxes the 360×780 phone inside any viewport.
   ══════════════════════════════════════════════════════════════ */
function Stage({ children }) {
  const [scale, setScale] = useState(1);
  useEffect(() => {
    const compute = () => {
      const pad = 56, w = window.innerWidth, h = window.innerHeight;
      setScale(Math.min((h - pad*2) / 792, (w - pad*2) / 372, 1.2));
    };
    compute();
    window.addEventListener('resize', compute);
    return () => window.removeEventListener('resize', compute);
  }, []);
  return (
    <div style={{
      width: 372, height: 792,
      transform: `scale(${scale})`, transformOrigin: 'center center',
      position: 'relative',
    }}>{children}</div>
  );
}

  return (

/* ══════════════════════════════════════════════════════════════
   DOMAIN VISUAL SIGNATURES — these are the TreadForm-specific
   marks the spec requires. They show up across multiple screens
   so the user reads "측정 도구" not "운동복 브랜드" instantly.
   ══════════════════════════════════════════════════════════════ */

// Side-view runner skeleton mid-stride. Coordinates picked so the
// figure reads as "측면 골격 + 키포인트" — exactly the MediaPipe Pose
// metaphor the PRD calls out (33 joints, side view, 측면 영상).
// `pose='danger'` extends the front leg WAY forward (오버스트라이딩 +
// 뒤꿈치 착지 visual cue) and turns the front knee/ankle dots red.
function SkeletonSig({ size = 80, animateJoints = false, beltLine = false, pose = 'good' }) {
  const w = size, h = size * 1.25;
  const line = 'var(--c-text-2)';
  const goodDot = 'var(--c-primary)';
  const dangerDot = 'var(--c-danger)';
  const isDanger = pose === 'danger';

  // Joint positions vary by pose. Front leg shifts forward (left) and
  // straightens out when posing the heel-strike / overstride moment.
  const knee = isDanger
    ? { cx: 22, cy: 70 }   // knee extended forward, lower
    : { cx: 32, cy: 66 };
  const ankle = isDanger
    ? { cx: 12, cy: 92 }   // overstride — foot way ahead of hip
    : { cx: 26, cy: 88 };

  const joints = [
    { cx: 38, cy: 26, r: 2.5, c: goodDot },
    { cx: 38, cy: 46, r: 3.0, c: goodDot },
    { cx: knee.cx,  cy: knee.cy,  r: 3.0, c: isDanger ? dangerDot : goodDot },
    { cx: ankle.cx, cy: ankle.cy, r: 3.5, c: isDanger ? dangerDot : goodDot },
    { cx: 48, cy: 62, r: 3.0, c: goodDot },
    { cx: 56, cy: 82, r: 3.0, c: goodDot },
    { cx: 48, cy: 40, r: 2.5, c: goodDot },
    { cx: 44, cy: 52, r: 2.5, c: goodDot },
  ];

  return (
    <svg width={w} height={h} viewBox="0 0 80 100" style={{ display: 'block' }}>
      {beltLine && (
        <line x1="6" y1="93" x2="74" y2="93"
              stroke="var(--c-bd-s)" strokeWidth="1" strokeDasharray="2 3"/>
      )}
      <g stroke={line} strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="38" cy="14" r="6"/>
        <line x1="38" y1="20" x2="38" y2="46"/>
        <line x1="38" y1="26" x2="48" y2="40"/>
        <line x1="48" y1="40" x2="44" y2="52"/>
        {/* front leg — uses computed knee/ankle so pose can flex it forward */}
        <line x1="38" y1="46" x2={knee.cx} y2={knee.cy}
              stroke={isDanger ? dangerDot : line}/>
        <line x1={knee.cx} y1={knee.cy} x2={ankle.cx} y2={ankle.cy}
              stroke={isDanger ? dangerDot : line}/>
        {/* back leg — unchanged */}
        <line x1="38" y1="46" x2="48" y2="62"/>
        <line x1="48" y1="62" x2="56" y2="82"/>
      </g>
      <g>
        {joints.map((j, i) => (
          <circle key={i} cx={j.cx} cy={j.cy} r={j.r} fill={j.c}
            style={animateJoints ? {
              transformOrigin: `${j.cx}px ${j.cy}px`,
              animation: `jointPop .35s ease-out ${0.12 + i * 0.06}s both`,
            } : undefined}/>
        ))}
      </g>
    </svg>
  );
}

// Vertical-oscillation sine — secondary domain signature.
function SineSig({ width = 80, height = 24, color = 'var(--c-primary)', endDots = false }) {
  // Two wavelengths visible in the given width.
  const mid = height / 2;
  const amp = mid - 3;
  const d = `M 0 ${mid} Q ${width*0.125} ${mid - amp} ${width*0.25} ${mid} `
          + `T ${width*0.5} ${mid} T ${width*0.75} ${mid} T ${width} ${mid}`;
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} fill="none">
      <path d={d} stroke={color} strokeWidth="2" strokeLinecap="round"/>
      {endDots && (
        <>
          <circle cx="0"     cy={mid} r="2" fill={color}/>
          <circle cx={width} cy={mid} r="2" fill={color}/>
        </>
      )}
    </svg>
  );
}

/* ──────────────────────────────────────────────────────────────

   8-second analysis concept the spec calls out as a signature.
─────────────────────────────────────────────────────────────── */
function CTACard({ onClick }) {
  const [pressed, setPressed] = useState(false);
  return (
    <button
      onMouseDown={() => setPressed(true)}
      onMouseUp={() => setPressed(false)}
      onMouseLeave={() => setPressed(false)}
      onTouchStart={() => setPressed(true)}
      onTouchEnd={() => setPressed(false)}
      onClick={onClick}
      style={{
        position: 'relative', width: '100%', height: '100%',
        background: 'var(--c-primary-subtle)',
        border: 0, borderRadius: 24,
        padding: 0, fontFamily: 'inherit', textAlign: 'left',
        cursor: 'pointer', overflow: 'hidden',
        transform: pressed ? 'scale(0.98)' : 'scale(1)',
        transition: 'transform .12s ease-out',
        color: 'var(--c-text)',
        display: 'block',
      }}>
      {/* top-right decoration — micro cyan dot grid, mask falls off
          toward the center so it doesn't fight the skeleton */}

        position: 'absolute', top: 0, right: 0, width: 140, height: 140,
        backgroundImage: 'radial-gradient(var(--c-primary) 1px, transparent 1px)',
        backgroundSize: '10px 10px',
        opacity: 0.15,

      </div>

      {/* micro label — absolutely positioned to dodge button's quirky
          internal flow (browsers wrap button content in an anonymous

      <div style={{
        position: 'absolute', top: 20, left: 20,
        fontSize: 11, fontWeight: 600, letterSpacing: '0.1em',

/* ══════════════════════════════════════════════════════════════
   STEP 1 · CAMERA — dark capture surface, AR-style alignment.
   Spec: belt guide + pelvis box, 33-joint counter that fills 0→33,
   pill flips to "정렬 완료" + shutter activates.
   ══════════════════════════════════════════════════════════════ */
function CameraScreen({ visible, onBack, onRecordedFile, onGallery, onFallbackCamera }) {
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const recorderRef = useRef(null);
  const chunksRef = useRef([]);
  const timerRef = useRef(null);
  const [cameraError, setCameraError] = useState('');
  const [recording, setRecording] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const [joints, setJoints] = useState(0);
  const aligned = joints >= 33;

  const stopStream = () => {
    if (timerRef.current) clearInterval(timerRef.current);
    timerRef.current = null;
    streamRef.current?.getTracks?.().forEach(track => track.stop());
    streamRef.current = null;
    recorderRef.current = null;
    setRecording(false);
    setElapsed(0);
  };

  useEffect(() => {
    if (!visible) {
      stopStream();
      setJoints(0);
      setCameraError('');
      return;
    }

    let cancelled = false;
    const startCamera = async () => {
      try {
        if (!navigator.mediaDevices?.getUserMedia) {
          throw new Error('이 브라우저에서는 앱 안 카메라를 사용할 수 없어요.');
        }
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 1280 },
            height: { ideal: 720 },
          },
          audio: false,
        });
        if (cancelled) {
          stream.getTracks().forEach(track => track.stop());
          return;
        }
        streamRef.current = stream;
        if (videoRef.current) {
          videoRef.current.srcObject = stream;
          await videoRef.current.play().catch(() => {});
        }
      } catch (error) {
        if (!cancelled) {
          setCameraError(error?.message || '카메라 권한을 확인해주세요.');
        }
      }
    };
    startCamera();
    return () => {
      cancelled = true;
      stopStream();
    };
  }, [visible]);

  useEffect(() => {
    if (!visible) { setJoints(0); return; }
    let n = 0;
    const id = setInterval(() => {
      n = Math.min(33, n + Math.ceil(Math.random() * 3));
      setJoints(n);
      if (n >= 33) clearInterval(id);
    }, 70);
    return () => clearInterval(id);
  }, [visible]);

  const startRecording = () => {
    const stream = streamRef.current;
    if (!stream || !window.MediaRecorder) {
      onFallbackCamera?.();
      return;
    }

    const mimeType = [
      'video/mp4;codecs=h264',
      'video/mp4',
      'video/webm;codecs=vp9',
      'video/webm',
    ].find(type => MediaRecorder.isTypeSupported?.(type)) || '';

    chunksRef.current = [];
    const recorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);
    recorderRef.current = recorder;
    recorder.ondataavailable = event => {
      if (event.data?.size) chunksRef.current.push(event.data);
    };
    recorder.onstop = () => {
      const blobType = recorder.mimeType || mimeType || 'video/mp4';
      const blob = new Blob(chunksRef.current, { type: blobType });
      const ext = blobType.includes('webm') ? 'webm' : 'mp4';
      const file = new File([blob], `treadform-camera-${Date.now()}.${ext}`, { type: blobType });
      stopStream();
      onRecordedFile?.(file);
    };
    recorder.start();
    setRecording(true);
    setElapsed(0);
    const started = performance.now();
    timerRef.current = setInterval(() => {
      const sec = (performance.now() - started) / 1000;
      setElapsed(sec);
      if (sec >= REC_DURATION && recorder.state === 'recording') {
        recorder.stop();
      }
    }, 100);
  };

  const stopRecording = () => {
    const recorder = recorderRef.current;
    if (recorder?.state === 'recording') recorder.stop();
  };

  return (
    <div style={{
      position: 'absolute', inset: 0,
      background: 'var(--c-text)',
      opacity: visible ? 1 : 0,
      transition: 'opacity .3s ease-out',
      pointerEvents: visible ? 'auto' : 'none',
      zIndex: 95,
      color: 'var(--c-cam-text-1)',
    }}>
      <StatusBarDark/>

      <video
        ref={videoRef}
        muted
        playsInline
        autoPlay
        style={{
          position: 'absolute',
          inset: 0,
          width: '100%',
          height: '100%',
          objectFit: 'cover',
          opacity: cameraError ? 0 : 1,
        }}
      />
      <div style={{
        position: 'absolute',
        inset: 0,
        background: cameraError
          ? 'linear-gradient(180deg, rgba(15,23,42,0.92), rgba(15,23,42,0.78))'
          : 'linear-gradient(180deg, rgba(15,23,42,0.54), rgba(15,23,42,0.14) 38%, rgba(15,23,42,0.62))',
      }}/>

      <div style={{
        position: 'absolute', top: 56, left: 22, right: 22, zIndex: 5,
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      }}>
        <button onClick={() => { stopStream(); onBack(); }} style={cameraCircleBtn(54)}>
          <CloseIcon size={24} color="var(--c-bg)"/>
        </button>
        <div style={{
          fontSize: 32,
          fontWeight: 500,
          color: 'var(--c-bg)',
          fontVariantNumeric: 'tabular-nums',
          letterSpacing: '-0.02em',
        }}>{recording ? `00:${String(Math.floor(elapsed)).padStart(2, '0')}` : '00:00'}</div>
        <button style={cameraGuideBtn()}>지침</button>
      </div>

      {!cameraError && <CameraGuideOverlay aligned={aligned} recording={recording} elapsed={elapsed}/>}

      {cameraError && (
        <div style={{
          position: 'absolute',
          top: 210,
          left: 30,
          right: 30,
          textAlign: 'center',
          color: 'var(--c-bg)',
        }}>
          <CameraIcon size={40} color="var(--c-primary)"/>
          <div style={{ marginTop: 18, fontSize: 22, fontWeight: 800, letterSpacing: '-0.02em' }}>
            카메라를 열 수 없어요
          </div>
          <div style={{ marginTop: 8, fontSize: 14, lineHeight: 1.5, color: 'var(--c-cam-text-2)' }}>
            아이폰 Safari에서 LAN 주소로 접속하면 앱 안 카메라가 제한될 수 있어요. 기본 카메라 촬영으로 이어갈게요.
          </div>
          <button onClick={onFallbackCamera} style={{
            marginTop: 22,
            height: 52,
            width: '100%',
            border: 0,
            borderRadius: 16,
            background: 'var(--c-primary)',
            color: 'var(--c-bg)',
            fontSize: 16,
            fontWeight: 800,
            fontFamily: 'inherit',
            cursor: 'pointer',
          }}>기본 카메라로 촬영</button>
        </div>
      )}

      <div style={{
        position: 'absolute', left: 0, right: 0, bottom: 28, zIndex: 5,
        padding: '0 24px',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <button onClick={onGallery} style={cameraUtilityBtn()} aria-label="갤러리에서 영상 가져오기">
            <GalleryIcon size={28} color="var(--c-bg)"/>
            <span style={{
              marginTop: 4,
              fontSize: 14,
              fontWeight: 800,
              color: 'var(--c-bg)',
              letterSpacing: '-0.02em',
            }}>갤러리</span>
          </button>
          <CameraRecordButton
            recording={recording}
            disabled={!aligned && !recording}
            onClick={recording ? stopRecording : startRecording}
          />
          <button style={{ ...cameraUtilityBtn(), opacity: 0, pointerEvents: 'none' }} aria-hidden="true">
            <FlipIcon size={24} color="var(--c-bg)"/>
          </button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   STEP 2 · RECORDING — dark surface, REC indicator + 8s countdown.
   Skeleton actually moves (we toggle danger pose periodically so the
   "위험 자세 감지" counter has something to count). At t=8.0 we hand
   off to STEP 3 automatically.
   ══════════════════════════════════════════════════════════════ */
const REC_DURATION = 8.0;
// Heel-strike moments — when these tick by during recording the runner
// flashes a danger pose and the counter increments. Hand-tuned to
// produce 4 events across the 8s clip so 결과 reads believably.
const DANGER_TIMES = [1.4, 3.2, 5.0, 6.8];
const DANGER_WIN   = 0.55; // seconds the danger pose holds after trigger
const API_ORIGIN = (() => {
  const host = window.location.hostname || '127.0.0.1';
  const protocol = window.location.protocol === 'https:' ? 'https:' : 'http:';
  return `${protocol}//${host}:8000`;
})();

function toApiUrl(path) {
  if (!path) return '';
  if (/^https?:\/\//.test(path)) return path;
  return `${API_ORIGIN}${path.startsWith('/') ? path : `/${path}`}`;
}

function statusTone(status, warn = 'warn') {
  if (!status) return 'success';
  const s = String(status).toLowerCase();
  if (['good', 'safe', 'success', 'normal', 'forefoot', 'midfoot', 'good_tibia', 'neutral_torso', 'good_arm_swing', 'aligned_head'].includes(s)) return 'success';
  if (['borderline', 'warning', 'warn', 'heel', 'over', 'too_upright', 'too_tight', 'too_open', 'unknown'].includes(s)) return warn;
  if (['danger', 'stiff', 'over_bent', 'bad', 'overreach_tibia', 'excessive_lean', 'forward_head'].includes(s)) return 'danger';
  return 'success';
}

function formatDegree(v) {
  return Number.isFinite(Number(v)) ? `${Math.round(Number(v))}°` : '측정 중';
}

function formatCm(v) {
  return Number.isFinite(Number(v)) ? `${(Number(v) * 100).toFixed(1)} cm` : '측정 중';
}

function formatRatioPct(v) {
  return Number.isFinite(Number(v)) ? `${Math.round(Number(v) * 100)}%` : '측정 중';
}

function getTreadmillSpeed(resultData) {
  const raw = resultData?.user_metrics?.treadmill_speed_kmh
           ?? resultData?.analysis_result?.summary?.treadmill_speed_kmh
           ?? resultData?.treadmill_speed_kmh;
  const speed = Number(raw);
  return Number.isFinite(speed) && speed > 0 ? speed : null;
}

function makeMetricCards(resultData, danger) {
  const r = resultData?.analysis_result || {};
  const m = r.metrics || {};
  const speed = getTreadmillSpeed(resultData);
  const knee = m.knee_flexion || {};
  const foot = m.foot_strike || {};
  const over = m.overstriding || {};
  const osc = m.vertical_oscillation || {};
  const tibia = m.landing_tibia || {};
  const torso = m.torso_posture || {};
  const arm = m.arm_position || {};
  const head = m.head_position || {};
  const footCounts = foot.status_counts || {};
  const heelCount = footCounts.heel ?? danger ?? 0;
  const overCount = over.status_counts?.over ?? 0;
  const tibiaOverCount = tibia.status_counts?.overreach ?? 0;
  return [
    {
      id: 'speed',
      label: '러닝 속도',
      value: speed ? `${speed.toFixed(1)} km/h` : '입력 필요',
      delta: speed ? '트레드밀 입력값' : '결과 비교 기준',
      tone: speed ? 'success' : 'warn',
    },
    {
      id: 'knee',
      label: '무릎 굴곡',
      value: formatDegree(knee.avg_angle),
      delta: '실측 평균',
      tone: statusTone(knee.status),
    },
    {
      id: 'strike',
      label: '발 착지',
      value: `뒤꿈치 ${heelCount}회`,
      delta: `${r.summary?.total_strikes ?? 0}회 착지`,
      tone: heelCount > 0 ? 'warn' : 'success',
    },
    {
      id: 'stride',
      label: '오버스트라이딩',
      value: overCount > 0 ? `${overCount}회` : '0회',
      delta: formatCm(over.avg_distance),
      tone: overCount > 0 ? 'warn' : 'success',
    },
    {
      id: 'osc',
      label: '수직 진폭',
      value: formatCm(osc.avg_value),
      delta: osc.status === 'good' ? '효율적' : '확인 필요',
      tone: statusTone(osc.status),
    },
    {
      id: 'tibia',
      label: '착지 정강이',
      value: tibiaOverCount > 0 ? `${tibiaOverCount}회` : formatDegree(tibia.avg_angle),
      delta: '전방 착지',
      tone: tibiaOverCount > 0 ? 'warn' : statusTone(tibia.status),
    },
    {
      id: 'torso',
      label: '몸통 자세',
      value: formatDegree(torso.avg_angle),
      delta: torso.status === 'neutral_torso' ? '안정' : '확인 필요',
      tone: statusTone(torso.status),
    },
    {
      id: 'arm',
      label: '팔 위치',
      value: formatDegree(arm.avg_angle),
      delta: arm.status === 'good_arm_swing' ? '자연스러움' : '리듬 확인',
      tone: statusTone(arm.status),
    },
    {
      id: 'head',
      label: '머리 위치',
      value: formatRatioPct(head.avg_ratio),
      delta: head.status === 'aligned_head' ? '정렬 양호' : '전방 쏠림',
      tone: statusTone(head.status),
    },
  ];
}

function makeRunningStyle(resultData, metricCards) {
  const r = resultData?.analysis_result || {};
  const m = r.metrics || {};
  const speed = getTreadmillSpeed(resultData);
  const heel = m.foot_strike?.status_counts?.heel ?? 0;
  const over = m.overstriding?.status_counts?.over ?? 0;
  const tibia = m.landing_tibia?.status_counts?.overreach ?? 0;
  const stiff = m.knee_flexion?.status_counts?.stiff ?? 0;
  const osc = Number(m.vertical_oscillation?.avg_value);
  const torso = m.torso_posture?.status;
  const head = m.head_position?.status;
  const total = r.summary?.total_strikes ?? 0;

  if (over + tibia >= 3) {
    return {
      name: '과보폭형',
      tone: 'warn',
      summary: `속도 ${speed ? `${speed.toFixed(1)}km/h` : '입력값'}에서 발이 몸보다 앞에 떨어지는 경향이 보여요.`,
      evidence: [`전방 착지 ${over + tibia}회`, total ? `착지 ${total}회 중` : '', speed ? `${speed.toFixed(1)} km/h` : '속도 입력'],
      target: '다음 목표: 발 착지 위치를 엉덩이 아래에 더 가깝게',
    };
  }
  if (heel >= 3 || (Number.isFinite(osc) && osc >= 0.04)) {
    return {
      name: '충격형',
      tone: 'warn',
      summary: '착지 충격이나 위아래 흔들림이 커질 수 있는 패턴이에요.',
      evidence: [`뒤꿈치 ${heel}회`, Number.isFinite(osc) ? `진폭 ${formatCm(osc)}` : '', speed ? `${speed.toFixed(1)} km/h` : ''],
      target: '다음 목표: 발소리를 줄이고 케이던스를 살짝 올리기',
    };
  }
  if (stiff >= 2) {
    return {
      name: '경직형',
      tone: 'warn',
      summary: '착지 때 무릎 완충이 부족해 다리가 뻣뻣하게 보일 수 있어요.',
      evidence: [`경직 ${stiff}회`, `무릎 ${formatDegree(m.knee_flexion?.avg_angle)}`, speed ? `${speed.toFixed(1)} km/h` : ''],
      target: '다음 목표: 착지 순간 무릎을 잠그지 않기',
    };
  }
  if (torso === 'excessive_lean' || head === 'forward_head') {
    return {
      name: '상체 쏠림형',
      tone: 'warn',
      summary: '몸통이나 머리가 앞으로 쏠려 보폭과 착지 위치에 영향을 줄 수 있어요.',
      evidence: [`몸통 ${formatDegree(m.torso_posture?.avg_angle)}`, `머리 ${formatRatioPct(m.head_position?.avg_ratio)}`, speed ? `${speed.toFixed(1)} km/h` : ''],
      target: '다음 목표: 시선을 전방에 두고 발목부터 가볍게 기울이기',
    };
  }
  const good = metricCards.filter(card => card.tone === 'success').slice(0, 3).map(card => card.label);
  return {
    name: '안정형',
    tone: 'success',
    summary: '현재 속도에서 착지와 상체 흐름이 비교적 안정적인 패턴이에요.',
    evidence: [speed ? `${speed.toFixed(1)} km/h` : '', ...good].filter(Boolean),
    target: '다음 목표: 같은 속도로 반복 측정해 일관성 확인',
  };
}

function makeImprovementItems(resultData, metricCards) {
  const r = resultData?.analysis_result || {};
  const m = resultData?.analysis_result?.metrics || {};
  const dangerRows = Array.isArray(r.danger_timestamps) ? r.danger_timestamps : [];
  const momentText = (types) => {
    const typeSet = new Set(types);
    const moments = dangerRows
      .filter(row => typeof row === 'number' || typeSet.has(row?.type))
      .map(row => typeof row === 'number' ? row : Number(row?.time_sec))
      .filter(Number.isFinite)
      .sort((a, b) => a - b)
      .slice(0, 3);
    if (!moments.length) return '';
    return moments.map(sec => `${sec.toFixed(1)}s`).join(', ');
  };
  const items = [];
  const add = (title, body, tone = 'warn', evidence = []) => {
    items.push({ title, body, tone, evidence: evidence.filter(Boolean).slice(0, 3) });
  };

  const tibiaOver = m.landing_tibia?.status_counts?.overreach ?? 0;
  const heel = m.foot_strike?.status_counts?.heel ?? 0;
  const over = m.overstriding?.status_counts?.over ?? 0;
  const torso = m.torso_posture?.status;
  const arm = m.arm_position?.status;
  const head = m.head_position?.status;
  const kneeCounts = m.knee_flexion?.status_counts || {};
  const kneeAvg = m.knee_flexion?.avg_angle;
  const overAvg = m.overstriding?.avg_distance;
  const oscAvg = m.vertical_oscillation?.avg_value;
  const tibiaAvg = m.landing_tibia?.avg_angle;
  const torsoAvg = m.torso_posture?.avg_angle;
  const armAvg = m.arm_position?.avg_angle;
  const headAvg = m.head_position?.avg_ratio;
  const totalStrikes = r.summary?.total_strikes;
  const strikeText = Number.isFinite(Number(totalStrikes)) ? `총 ${totalStrikes}회 착지 중` : '분석된 착지 중';

  if (tibiaOver > 0) {
    add(
      '발을 몸 아래에 더 가깝게',
      `${strikeText} 정강이가 앞쪽으로 기울어진 착지가 ${tibiaOver}회 나왔어요. 평균 정강이 각도는 ${formatDegree(tibiaAvg)}입니다.`,
      tibiaOver >= 3 ? 'danger' : 'warn',
      [`위험 ${tibiaOver}회`, `평균 ${formatDegree(tibiaAvg)}`, momentText(['overreach_tibia'])]
    );
  }
  if (over > 0) {
    add(
      '보폭을 살짝 줄이기',
      `${strikeText} 발이 무게중심보다 앞에 떨어진 구간이 ${over}회 감지됐어요. 평균 전방 거리는 ${formatCm(overAvg)}입니다.`,
      over >= 3 ? 'danger' : 'warn',
      [`오버 ${over}회`, formatCm(overAvg), momentText(['over_stride'])]
    );
  }
  if (heel > 0) {
    add(
      '뒤꿈치 충격 줄이기',
      `${strikeText} 뒤꿈치 착지가 ${heel}회 확인됐어요. 충격을 줄이려면 발을 몸 아래에 내려놓는 느낌이 좋습니다.`,
      heel >= 3 ? 'danger' : 'warn',
      [`뒤꿈치 ${heel}회`, momentText(['heel_strike'])]
    );
  }
  if ((kneeCounts.stiff ?? 0) > 0) {
    add(
      '착지 때 무릎을 조금 더 부드럽게',
      `무릎이 펴진 착지가 ${kneeCounts.stiff}회 감지됐어요. 평균 무릎 굴곡은 ${formatDegree(kneeAvg)}라서 착지 순간 완충을 조금 더 만들면 좋아요.`,
      (kneeCounts.stiff ?? 0) >= 3 ? 'danger' : 'warn',
      [`경직 ${kneeCounts.stiff}회`, `평균 ${formatDegree(kneeAvg)}`, momentText(['stiff_knee'])]
    );
  }
  if (torso === 'too_upright') {
    add(
      '몸통을 아주 살짝 앞으로',
      `평균 몸통 기울기가 ${formatDegree(torsoAvg)}로 거의 세워진 흐름이에요. 허리를 접기보다 발목부터 아주 살짝 기울여보세요.`,
      'warn',
      [`몸통 ${formatDegree(torsoAvg)}`, `진폭 ${formatCm(oscAvg)}`]
    );
  } else if (torso === 'excessive_lean') {
    add(
      '상체 숙임 줄이기',
      `평균 몸통 기울기가 ${formatDegree(torsoAvg)}로 크게 나왔어요. 가슴과 시선을 편하게 들어 보폭이 앞으로 끌려가지 않게 해보세요.`,
      'warn',
      [`몸통 ${formatDegree(torsoAvg)}`, `진폭 ${formatCm(oscAvg)}`]
    );
  }
  if (arm === 'too_tight') {
    add(
      '팔 긴장 풀기',
      `평균 팔꿈치 각도가 ${formatDegree(armAvg)}로 좁게 잡혔어요. 어깨 힘을 빼고 팔이 앞뒤로 자연스럽게 지나가게 해보세요.`,
      'warn',
      [`팔 ${formatDegree(armAvg)}`]
    );
  } else if (arm === 'too_open') {
    add(
      '팔꿈치를 자연스럽게 접기',
      `평균 팔꿈치 각도가 ${formatDegree(armAvg)}로 크게 열렸어요. 팔을 조금 더 접으면 상체 리듬이 안정될 수 있습니다.`,
      'warn',
      [`팔 ${formatDegree(armAvg)}`]
    );
  }
  if (head === 'forward_head') {
    add(
      '목을 길게 세우기',
      `머리 전방 쏠림 비율이 평균 ${formatRatioPct(headAvg)}로 나왔어요. 턱을 살짝 당기고 시선을 전방에 둬보세요.`,
      'warn',
      [`머리 ${formatRatioPct(headAvg)}`]
    );
  }

  if (items.length === 0) {
    const strikeCard = metricCards.find(card => card.id === 'strike');
    const fallbackDanger = Number.parseInt(String(strikeCard?.value || '').replace(/[^0-9]/g, ''), 10);
    if (strikeCard?.tone !== 'success' && fallbackDanger > 0) {
      return [
        {
          title: '위험 구간을 먼저 확인하세요',
          body: `대표 위험 구간이 ${fallbackDanger}회 표시됐어요. 영상 바로 아래의 시간 버튼을 눌러 착지 순간을 먼저 확인해보세요.`,
          tone: fallbackDanger >= 4 ? 'danger' : 'warn',
          evidence: [`위험 ${fallbackDanger}회`, '영상 바로가기'],
        },
      ];
    }
  }

  if (items.length === 0) {
    const good = metricCards.filter(card => card.tone === 'success').slice(0, 2);
    return [
      {
        title: '오늘 자세는 전반적으로 안정적입니다',
        body: good.length ? `${good.map(card => card.label).join(', ')} 지표가 좋은 흐름이에요. 다음 측정에서도 같은 속도와 카메라 각도로 비교해보세요.` : '현재 리듬을 유지하면서 다음 측정에서 변화를 비교해보세요.',
        tone: 'success',
        evidence: [
          Number.isFinite(Number(kneeAvg)) ? `무릎 ${formatDegree(kneeAvg)}` : '',
          Number.isFinite(Number(oscAvg)) ? `진폭 ${formatCm(oscAvg)}` : '',
        ].filter(Boolean),
      },
    ];
  }

  return items.slice(0, 3);
}

function makeConfidenceDetails(resultData, confidence) {
  const r = resultData?.analysis_result || {};
  const warnings = resultData?.warnings || [];
  const fps = r.summary?.fps;
  const duration = r.summary?.duration_sec;
  const totalStrikes = r.summary?.total_strikes;
  const levelLabel = confidence === 'high' ? '높음' : confidence === 'medium' ? '보통' : '확인 필요';
  return [
    {
      label: '신뢰도',
      value: levelLabel,
      tone: confidence === 'high' ? 'success' : confidence === 'medium' ? 'warn' : 'danger',
    },
    {
      label: '영상 길이',
      value: Number.isFinite(Number(duration)) ? `${Number(duration).toFixed(1)}초` : '측정 중',
      tone: 'success',
    },
    {
      label: '프레임',
      value: Number.isFinite(Number(fps)) ? `${Math.round(Number(fps))}fps` : '확인 중',
      tone: Number(fps) >= 30 ? 'success' : 'warn',
    },
    {
      label: '착지 샘플',
      value: Number.isFinite(Number(totalStrikes)) ? `${totalStrikes}회` : '분석 중',
      tone: Number(totalStrikes) > 0 ? 'success' : 'warn',
    },
    {
      label: '검증 메시지',
      value: warnings.length ? `${warnings.length}개` : '없음',
      tone: warnings.length ? 'warn' : 'success',
    },
  ];
}

  const primary = improvementItems[0]?.title || '';
  if (/보폭|몸 아래|뒤꿈치|착지/.test(primary)) {

  if (/몸통|상체/.test(primary)) {
    return [

      { title: '시선 고정 런', body: '정면 한 지점을 보며 2분 동안 상체 흔들림 줄이기' },

  return [

    { title: '마무리 3분', body: '편한 속도로 자세가 무너지지 않는 리듬만 확인' },
  ];
}

function scoreFromAnalysis(resultData, danger) {
  const r = resultData?.analysis_result || {};
  const m = r.metrics || {};
  const heel = m.foot_strike?.status_counts?.heel ?? 0;
  const over = m.overstriding?.status_counts?.over ?? 0;
  const tibia = m.landing_tibia?.status_counts?.overreach ?? 0;
  const torsoBad = ['too_upright', 'excessive_lean'].includes(m.torso_posture?.status) ? 1 : 0;
  const armBad = ['too_tight', 'too_open'].includes(m.arm_position?.status) ? 1 : 0;
  const headBad = m.head_position?.status === 'forward_head' ? 1 : 0;
  const warnings = resultData?.warnings?.length || 0;
  return Math.max(42, Math.min(98, 96 - (danger || 0) * 4 - heel * 3 - over * 4 - tibia * 3 - (torsoBad + armBad + headBad) * 4 - warnings * 6));
}

function RecordingScreen({ visible, onDone }) {
  const [t, setT] = useState(0);

  useEffect(() => {
    if (!visible) { setT(0); return; }
    const start = performance.now();
    const id = setInterval(() => {
      const e = (performance.now() - start) / 1000;
      if (e >= REC_DURATION) {
        setT(REC_DURATION); clearInterval(id); onDone();
        return;
      }
      setT(e);
    }, 50);
    return () => clearInterval(id);
  }, [visible]);

  // Which danger events have already "fired"
  const captured = DANGER_TIMES.filter(d => t >= d).length;
  // Are we inside a danger window right now?
  const insideDanger = DANGER_TIMES.some(d => t >= d && t <= d + DANGER_WIN);
  const pose = insideDanger ? 'danger' : 'good';

  const bob = Math.sin((t / REC_DURATION) * Math.PI * 16) * 4;

/* ══════════════════════════════════════════════════════════════
   STEP 3 · UPLOAD + ANALYZE — light surface.
   Two sub-phases share this screen so the transition feels like one
   continuous "processing" experience. Upload first (0→100% bar),
   then analyze (5-step checklist + circular percent gauge).
   ══════════════════════════════════════════════════════════════ */
const ANALYZE_STEPS = [
  '720p로 변환',
  '33개 관절 좌표 추출',
  '발목 착지 시점 판별',
  '3대 핵심 지표 계산',
  '한국어 코칭 메시지 생성',
];

function AnalyzeScreen({
  visible,
  onDone,
  controlled = false,
  progress,
  stepIndex,
  phase = 'analyze',
  title,
  subtitle,
}) {
  // Two sub-phases.  upload: 0..1 fills the bar (~1.8s).  analyze: walks
  // ANALYZE_STEPS one by one (~1s each), gauge tracks % to total.
  const [sub, setSub] = useState('upload');
  const [upPct, setUpPct] = useState(0);
  const [stepIdx, setStepIdx] = useState(-1);

  useEffect(() => {
    if (!visible) { setSub('upload'); setUpPct(0); setStepIdx(-1); return; }
    if (controlled) return;
    const UPLOAD_MS = 1800;
    const start = performance.now();
    const id = setInterval(() => {
      const e = performance.now() - start;
      const t = Math.min(1, e / UPLOAD_MS);
      const eased = 1 - Math.pow(1 - t, 2.2);
      setUpPct(eased);
      if (t >= 1) { clearInterval(id); setSub('analyze'); }
    }, 50);
    return () => clearInterval(id);
  }, [visible]);

  useEffect(() => {
    if (controlled || sub !== 'analyze') return;
    const STEP_MS = 900;
    let i = 0;
    setStepIdx(0);
    const id = setInterval(() => {
      i += 1;
      if (i >= ANALYZE_STEPS.length) {
        clearInterval(id);
        // small grace so the last step's "check" is visible
        setTimeout(onDone, 450);
        return;
      }
      setStepIdx(i);
    }, STEP_MS);
    return () => clearInterval(id);
  }, [sub]);

  const isUpload = controlled ? phase === 'upload' : sub === 'upload';
  const displayStepIdx = controlled ? stepIndex : stepIdx;

  // Circular gauge value — upload phase: 0..40%, analyze phase: 40..100%.
  // Splitting the band lets a single ring carry both sub-phases.
  const gaugePct = controlled
    ? Math.max(1, Math.min(100, Math.round(progress ?? 5)))
    : isUpload
    ? Math.round(upPct * 40)
    : 40 + Math.round(((stepIdx + 1) / ANALYZE_STEPS.length) * 60);
  const C = 2 * Math.PI * 86;

  return (
    <div style={{
      position: 'absolute', inset: 0,
      background: 'var(--c-bg)',
      opacity: visible ? 1 : 0,
      transition: 'opacity .3s ease-out',
      pointerEvents: visible ? 'auto' : 'none',
      zIndex: 15,
    }}>
      <StatusBar/>

      {/* upper area — gauge */}
      <div style={{
        position: 'absolute', top: 76, left: 0, right: 0,
        display: 'flex', justifyContent: 'center',
      }}>
        <div style={{ position: 'relative', width: 196, height: 196 }}>
          <svg width="196" height="196" viewBox="0 0 196 196" style={{ position: 'absolute', inset: 0 }}>
            <circle cx="98" cy="98" r="86" fill="none"
                    stroke="var(--c-s2)" strokeWidth="8"/>
            <circle cx="98" cy="98" r="86" fill="none"
                    stroke="var(--c-text)" strokeWidth="8"
                    strokeDasharray={`${C * (gaugePct/100)} ${C}`}
                    strokeLinecap="round"
                    transform="rotate(-90 98 98)"
                    style={{ transition: 'stroke-dasharray .25s ease-out' }}/>
          </svg>
          <div style={{
            position: 'absolute', inset: 0,
            display: 'flex', flexDirection: 'column',
            alignItems: 'center', justifyContent: 'center',
          }}>
            <div style={{
              fontSize: 44, fontWeight: 800, letterSpacing: '-0.04em',
              color: 'var(--c-text)', lineHeight: 1,
              fontVariantNumeric: 'tabular-nums',
            }}>
              {gaugePct}<span style={{ fontSize: 20, color: 'var(--c-text-2)', fontWeight: 600 }}>%</span>
            </div>
            <div style={{
              marginTop: 6, fontSize: 11, fontWeight: 600,
              color: 'var(--c-text-m)', letterSpacing: '0.08em', textTransform: 'uppercase',
            }}>분석 약 30초</div>
          </div>
        </div>
      </div>

      <LoadingBuddy/>

      <div style={{
        position: 'absolute', top: 342, left: 24, right: 24, textAlign: 'center',
      }}>
        <h1 style={{
          margin: 0, fontSize: 21, fontWeight: 800, letterSpacing: '-0.025em',
          color: 'var(--c-text)', lineHeight: 1.3,
        }}>
          {title || (isUpload ? '영상을 전송하고 있어요' : '8초 영상을 분석하고 있어요')}
        </h1>
        <p style={{
          margin: '8px 0 0', fontSize: 13, fontWeight: 500,
          color: 'var(--c-text-2)', letterSpacing: '-0.01em',
        }}>
          {subtitle || (isUpload ? '720p로 변환해 전송 중' : '3대 핵심 지표를 계산하는 중')}
        </p>
      </div>

      {/* lower area — either upload bar or step checklist */}
      <div style={{ position: 'absolute', top: 438, left: 24, right: 24 }}>
        {isUpload ? (
          <>
            <div style={{
              height: 4, borderRadius: 2,
              background: 'var(--c-s2)', overflow: 'hidden',
            }}>
              <div style={{
                height: '100%', width: `${Math.round(upPct * 100)}%`,
                background: 'var(--c-primary)', borderRadius: 2,
                transition: 'width .08s linear',
              }}/>
            </div>
            <div style={{
              marginTop: 10, display: 'flex', justifyContent: 'space-between',
              fontSize: 11, fontWeight: 500, color: 'var(--c-text-m)',
              letterSpacing: '-0.01em', fontVariantNumeric: 'tabular-nums',
            }}>
              <span>안전한 분석 서버로 전송</span>
              <span>{Math.round(upPct * 100)}%</span>
            </div>
          </>
        ) : (
          <div style={{
            background: 'var(--c-s1)', border: '1px solid var(--c-bd)',
            borderRadius: 14, padding: '14px 16px',
          }}>
            {ANALYZE_STEPS.map((s, i) => {
              const done   = i < displayStepIdx;
              const active = i === displayStepIdx;
              return (
                <div key={i} style={{
                  display: 'flex', alignItems: 'center', gap: 12,
                  padding: '8px 0',
                  opacity: done || active ? 1 : 0.45,
                  transition: 'opacity .25s',
                }}>
                  <StepCheck done={done} active={active}/>
                  <div style={{
                    flex: 1, fontSize: 14, letterSpacing: '-0.01em',
                    fontWeight: done || active ? 600 : 500,
                    color: done || active ? 'var(--c-text)' : 'var(--c-text-2)',
                  }}>{s}</div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function RecapClip({ videoUrl, label = '방금 촬영한 8초' }) {
  // Same hand-tuned loop as the recording phase, replayed at 0.75× so it
  // reads as a "recap" rather than a new take.
  const [t, setT] = useState(0);
  useEffect(() => {
    let last = performance.now();
    const id = setInterval(() => {
      const now = performance.now();
      setT(s => (s + (now - last) / 1000 * 0.75) % REC_DURATION);
      last = now;
    }, 50);
    return () => clearInterval(id);
  }, []);

  const insideDanger = DANGER_TIMES.some(d => t >= d && t <= d + DANGER_WIN);
  const pose = insideDanger ? 'danger' : 'good';
  const bob = Math.sin((t / REC_DURATION) * Math.PI * 16) * 3;

  return (
    <div style={{
      position: 'absolute', top: 256, left: 24, right: 24, height: 184,
      borderRadius: 16, overflow: 'hidden',
      background: 'var(--c-stage)',
    }}>
      {videoUrl ? (
        <video
          src={videoUrl}
          muted
          autoPlay
          loop
          playsInline
          controls
          style={{
            width: '100%', height: '100%',
            objectFit: 'cover',
            display: 'block',
            background: 'var(--c-stage)',
          }}
        />
      ) : (
        <>
          <div style={{ position: 'absolute', left: '50%', top: 26 + bob, transform: 'translateX(-50%)' }}>
            <SkeletonSig size={150} pose={pose}/>
          </div>
          {/* belt cue */}
          <div style={{ position: 'absolute', left: 28, right: 28, top: 152,
                        borderTop: '1.5px dashed var(--c-s2)' }}/>
        </>
      )}
      {/* timecode chip */}
      <div style={{
        position: 'absolute', top: 12, left: 12,
        padding: '4px 10px', borderRadius: 999,
        background: 'var(--c-bg)', backdropFilter: 'blur(8px)',
        color: 'var(--c-text)', fontSize: 11, fontWeight: 600,
        letterSpacing: '0.06em', textTransform: 'uppercase',
      }}>{label}</div>
      {/* live-style cursor in the bottom */}
      {!videoUrl && <div style={{
        position: 'absolute', left: 16, right: 16, bottom: 14,
        height: 3, borderRadius: 2, background: 'var(--c-bd-s)',
      }}>
        <div style={{
          height: '100%', width: `${(t / REC_DURATION) * 100}%`,
          background: 'var(--c-bg)', borderRadius: 2,
        }}/>
      </div>}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   STEP 5 · RESULT — full detail view.
   Player with skeleton overlay + auto 0.5× slow-mo over danger
   windows, danger-marker timeline, AI coaching card, 4 indicator
   chips with signal dots, confidence badge.
   ══════════════════════════════════════════════════════════════ */
function ResultScreen({ visible, danger, confidence = 'high', resultData, onBack }) {
  // Player: shared time-base that runs the recap. Inside a danger window
  // we tick at 0.5× to satisfy the spec's "Danger 진입 시 0.5x 자동 슬로우".
  const [t, setT] = useState(0);
  const [videoMode, setVideoMode] = useState('original');
  const videoRef = useRef(null);
  const r = resultData?.analysis_result || {};
  const metricCards = useMemo(() => makeMetricCards(resultData, danger), [resultData, danger]);
  const runningStyle = useMemo(() => makeRunningStyle(resultData, metricCards), [resultData, metricCards]);
  const improvementItems = useMemo(() => makeImprovementItems(resultData, metricCards), [resultData, metricCards]);
  const confidenceDetails = useMemo(() => makeConfidenceDetails(resultData, confidence), [resultData, confidence]);
  const drillItems = useMemo(() => makeDrillItems(improvementItems), [improvementItems]);
  const originalVideoUrl = toApiUrl(resultData?.original_video_url);
  const renderedVideoUrl = toApiUrl(resultData?.rendered_video_url);
  const selectedVideoUrl = videoMode === 'rendered'
    ? (renderedVideoUrl || originalVideoUrl)
    : (originalVideoUrl || renderedVideoUrl);
  const videoUrl = selectedVideoUrl;
  const activeVideoLabel = videoMode === 'original' ? '업로드 원본' : '관절 오버레이 분석';
  const csvUrl = toApiUrl(resultData?.csv_report_url);
  const coachMessage = resultData?.coach_message
    || (danger > 0
      ? `위험 자세가 ${danger}회 감지됐어요. 보폭을 조금 줄여 발이 무게중심 아래로 떨어지게 해보세요.`
      : '오늘 러닝 자세는 전반적으로 안정적입니다. 현재 리듬을 유지하면서 무릎과 발 착지를 계속 관찰해보세요.');
  const duration = r.summary?.duration_sec || REC_DURATION;
  const markers = Array.isArray(r.danger_timestamps)
    ? r.danger_timestamps.map(d => typeof d === 'number' ? d : Number(d?.time_sec)).filter(Number.isFinite)
    : DANGER_TIMES;
  useEffect(() => {
    if (!visible) { setT(0); return; }
    if (videoUrl) return;
    let last = performance.now();
    const id = setInterval(() => {
      const now = performance.now();
      const dt = (now - last) / 1000;
      last = now;
      setT(s => {
        const fallbackDanger = DANGER_TIMES.some(d => s >= d && s <= d + DANGER_WIN);
        const rate = fallbackDanger ? 0.5 : 1.0;
        return (s + dt * rate) % REC_DURATION;
      });
    }, 50);
    return () => clearInterval(id);
  }, [visible, videoUrl]);
  const insideDanger = markers.some(d => t >= d && t <= d + DANGER_WIN);
  const pose = insideDanger ? 'danger' : 'good';
  const bob = Math.sin((t / REC_DURATION) * Math.PI * 16) * 3;
  const seekTo = (sec) => {
    if (!Number.isFinite(sec)) return;
    const nextTime = Math.max(0, Math.min(sec, duration || sec));
    setT(nextTime);
    const video = videoRef.current;
    if (!video) return;
    const applySeek = () => {
      try {
        video.currentTime = Math.min(nextTime, Number.isFinite(video.duration) ? Math.max(video.duration - 0.05, 0) : nextTime);
        video.play?.().catch?.(() => {});
      } catch (error) {
        setT(nextTime);
      }
    };
    if (video.readyState >= 1) applySeek();
    else video.addEventListener('loadedmetadata', applySeek, { once: true });
  };

  return (
    <div style={{
      position: 'absolute', inset: 0,
      background: 'var(--c-bg)',
      opacity: visible ? 1 : 0,
      transition: 'opacity .3s ease-out',
      pointerEvents: visible ? 'auto' : 'none',
      zIndex: 15,
    }}>
      <StatusBar/>

      {/* nav */}
      <div style={{
        position: 'absolute', top: 52, left: 16, right: 16,
        display: 'flex', alignItems: 'center',
      }}>
        <button onClick={onBack} style={ghostBtn()}>
          <ChevronLeft size={20} color="var(--c-text-2)"/>
          홈
        </button>
        <div style={{ flex: 1 }}/>
        <ConfidenceBadge level={confidence}/>
      </div>

      <div style={{
        position: 'absolute',
        left: 0,
        right: 0,
        top: 88,
        bottom: 0,
        overflowY: 'auto',
        overflowX: 'hidden',
        WebkitOverflowScrolling: 'touch',
        padding: '12px 24px 34px',
      }}>
      {/* player */}
      <div style={{
        position: 'relative',
        height: 220,
        borderRadius: 18, overflow: 'hidden',
        background: 'var(--c-stage)',
      }}>
        {(originalVideoUrl || renderedVideoUrl) && (
          <div style={{
            position: 'absolute',
            top: 12,
            left: 12,
            zIndex: 4,
            display: 'inline-flex',
            padding: 3,
            borderRadius: 999,
            background: 'rgba(255,255,255,0.9)',
            border: '1px solid var(--c-bd)',
            boxShadow: 'var(--shadow-press)',
          }}>
            {[
              { id: 'original', label: '원본 영상', title: '업로드 원본' },
              { id: 'rendered', label: '관절 분석', title: '관절 오버레이 분석' },
            ].map(item => {
              const active = videoMode === item.id;
              const disabled = item.id === 'rendered' ? !renderedVideoUrl : !originalVideoUrl;
              return (
                <button
                  key={item.id}
                  disabled={disabled}
                  onClick={() => setVideoMode(item.id)}
                  style={{
                    height: 25,
                    padding: '0 9px',
                    border: 0,
                    borderRadius: 999,
                    background: active ? 'var(--c-text)' : 'transparent',
                    color: active ? 'var(--c-bg)' : disabled ? 'var(--c-text-3)' : 'var(--c-text-2)',
                    fontSize: 11,
                    fontWeight: 700,
                    fontFamily: 'inherit',
                    cursor: disabled ? 'not-allowed' : 'pointer',
                    letterSpacing: '-0.01em',
                  }}>
                  {item.label}
                </button>
              );
            })}
          </div>
        )}
        {videoUrl ? (
          <video
            ref={videoRef}
            key={videoUrl}
            src={videoUrl}
            muted
            autoPlay
            loop
            playsInline
            controls
            preload="metadata"
            onLoadedMetadata={(e) => {
              const nextDuration = Number(e.currentTarget.duration);
              if (Number.isFinite(nextDuration) && t > nextDuration) setT(0);
            }}
            onTimeUpdate={(e) => {
              setT(e.currentTarget.currentTime || 0);
            }}
            style={{
              width: '100%', height: '100%',
              objectFit: 'contain',
              display: 'block',
              background: 'var(--c-stage)',
            }}
          />
        ) : (
          <>
            <div style={{ position: 'absolute', left: '50%', top: 40 + bob, transform: 'translateX(-50%)' }}>
              <SkeletonSig size={160} pose={pose}/>
            </div>
            <div style={{ position: 'absolute', left: 28, right: 28, top: 188,
                          borderTop: '1.5px dashed var(--c-s2)' }}/>
          </>
        )}

        {videoUrl && videoMode === 'rendered' && !renderedVideoUrl && (
          <BrowserAnalysisOverlay metricCards={metricCards}/>
        )}

        {/* slow-mo badge — only visible during danger */}
        {!videoUrl && insideDanger && (
          <div style={{
            position: 'absolute', top: 12, right: 12,
            padding: '4px 10px', borderRadius: 999,
            background: 'var(--c-danger)', color: 'var(--c-bg)',
            fontSize: 11, fontWeight: 700, letterSpacing: '0.08em',
            textTransform: 'uppercase',
          }}>0.5× SLOW</div>
        )}

        {/* timecode + Danger label corner */}
        <div style={{
          position: 'absolute', bottom: 36, left: 14,
          fontSize: 12, fontWeight: 600,
          color: insideDanger ? 'var(--c-danger)' : 'var(--c-bg)',
          letterSpacing: '-0.01em', fontVariantNumeric: 'tabular-nums',
          transition: 'color .15s',
        }}>
          {videoUrl ? `${t.toFixed(1)}s · ${activeVideoLabel}` : `${t.toFixed(1)}s ${insideDanger ? '· 뒤꿈치 착지' : ''}`}
        </div>

        {/* Danger-marker timeline */}
        <div style={{ position: 'absolute', left: 14, right: 14, bottom: 14 }}>
          <div style={{
            position: 'relative', height: 6, borderRadius: 3,
            background: 'var(--c-bd-s)',
          }}>
            {/* danger marker bands */}
            {markers.map((d, i) => (
              <div key={i} style={{
                position: 'absolute', top: 0, bottom: 0,
                left: `${(d / duration) * 100}%`,
                width: `${(DANGER_WIN / duration) * 100}%`,
                background: 'var(--c-danger)', borderRadius: 2,
              }}/>
            ))}
            {/* playhead */}
            <div style={{
              position: 'absolute', top: -3, bottom: -3,
              left: `calc(${(t / Math.max(duration, 1)) * 100}% - 1px)`,
              width: 2, background: 'var(--c-bg)',
              borderRadius: 1,
              boxShadow: 'var(--shadow-press)',
            }}/>
          </div>
        </div>
      </div>

      {markers.length > 0 && (
        <DangerJumpCard markers={markers} duration={duration} onSeek={seekTo}/>
      )}

      <ImprovementCard items={improvementItems}/>

      <RunningStyleCard styleResult={runningStyle}/>

      {/* coaching card */}
      <div style={{
        position: 'relative',
        marginTop: 16,
        background: 'var(--c-s1)', border: '1px solid var(--c-bd)',
        borderRadius: 14, padding: '14px 16px',
      }}>
        <div style={{ fontSize: 11, fontWeight: 600,
                      color: 'var(--c-primary-dark)',
                      letterSpacing: '0.08em', textTransform: 'uppercase' }}>
          AI 코칭
        </div>
        <div style={{
          marginTop: 6, fontSize: 14, fontWeight: 500,
          color: 'var(--c-text)', lineHeight: 1.5, letterSpacing: '-0.01em',
        }}>
          {coachMessage}
        </div>
      </div>

      <ConfidenceDetailCard items={confidenceDetails}/>

      <DrillCard items={drillItems}/>

      {/* Indicator chips — signal dot + label + value, NOT emoji */}
      <div style={{
        marginTop: 16,
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'space-between',
      }}>
        <div style={{
          fontSize: 11,
          fontWeight: 800,
          color: 'var(--c-text-m)',
          letterSpacing: '0.08em',
          textTransform: 'uppercase',
        }}>전체 지표</div>
        <div style={{
          fontSize: 11,
          fontWeight: 700,
          color: 'var(--c-text-3)',
          letterSpacing: '-0.01em',
        }}>속도 기준 포함</div>
      </div>
      <div style={{
        position: 'relative',
        marginTop: 8,
        display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8,
      }}>
        {metricCards.map(m => (
          <IndicatorChip key={m.id} tone={m.tone} label={m.label} value={m.value}/>
        ))}
      </div>

      <div style={{
        position: 'relative',
        marginTop: 14,
        display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10,
      }}>
        <button
          onClick={() => { if (csvUrl) window.open(csvUrl, '_blank'); }}
          style={secondaryBtn()}>
          <DownloadIcon size={18} color="var(--c-text)"/>
          CSV 리포트
        </button>
        <button
          onClick={() => {
            const text = `TreadForm 분석 결과: 위험 자세 ${danger}건 · 신뢰도 ${confidence}`;
            if (navigator.share) navigator.share({ title: 'TreadForm 분석 결과', text, url: videoUrl || window.location.href });
            else navigator.clipboard?.writeText(videoUrl || window.location.href);
          }}
          style={primaryBtn()}>
          <ShareIcon size={18} color="var(--c-bg)"/>
          결과 공유
        </button>
      </div>
      </div>
    </div>
  );
}

                                : 'var(--c-danger)';

      background: 'var(--c-bg)', border: '1px solid var(--c-bd)',

      <span style={{
        width: 8, height: 8, borderRadius: 4, background: fg, flexShrink: 0,

      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{
          fontSize: 11, fontWeight: 500, color: 'var(--c-text-2)',
          letterSpacing: '-0.01em',
        }}>{label}</div>
        <div style={{
          marginTop: 1, fontSize: 13, fontWeight: 700,
          color: 'var(--c-text)', letterSpacing: '-0.01em',
          fontVariantNumeric: 'tabular-nums',
        }}>{value}</div>
      </div>
    </div>
  );
}

    <div style={{
      marginTop: 10,
      background: 'var(--c-bg)',
      border: '1px solid rgba(239,68,68,0.18)',

      <div style={{
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'space-between',
        gap: 10,
      }}>
        <div>
          <div style={{
            fontSize: 10,
            fontWeight: 800,
            color: 'var(--c-danger)',
            letterSpacing: '0.08em',
            textTransform: 'uppercase',
          }}>위험 구간</div>
          <div style={{
            marginTop: 2,
            fontSize: 12,
            lineHeight: 1.25,
            fontWeight: 800,
            color: 'var(--c-text)',
            letterSpacing: '-0.02em',
          }}>대표 순간으로 바로 이동</div>
        </div>
        <div style={{
          height: 25,
          padding: '0 9px',
          borderRadius: 999,
          background: 'var(--c-danger-bg)',
          color: 'var(--c-danger)',
          display: 'flex',
          alignItems: 'center',
          fontSize: 11,
          fontWeight: 900,
          fontVariantNumeric: 'tabular-nums',
          whiteSpace: 'nowrap',
        }}>{markers.length}개</div>
      </div>
      <div className="scroll-x" style={{
        marginTop: 9,
        display: 'flex',
        gap: 6,
        overflowX: 'auto',
        paddingBottom: 0,
        scrollbarWidth: 'none',
        msOverflowStyle: 'none',
      }}>
        {shown.map((sec, index) => (
          <button
            key={`${sec}-${index}`}
            onClick={() => onSeek(sec)}
            onPointerDown={(e) => {
              e.currentTarget.style.transform = 'scale(0.96)';
              onSeek(sec);
            }}
            onPointerUp={(e) => {
              e.currentTarget.style.transform = 'scale(1)';
            }}
            onPointerLeave={(e) => {
              e.currentTarget.style.transform = 'scale(1)';
            }}
            title={`${Number(sec).toFixed(1)}초로 이동`}
            aria-label={`${Number(sec).toFixed(1)}초 위험 구간으로 이동`}
            style={{
              flex: '0 0 auto',
              height: 31,
              minWidth: 58,
              padding: '0 10px',
              border: '1px solid rgba(239,68,68,0.26)',
              borderRadius: 999,
              background: 'var(--c-danger-bg)',
              color: 'var(--c-danger)',
              fontSize: 12,
              fontWeight: 900,
              fontFamily: 'inherit',
              fontVariantNumeric: 'tabular-nums',
              cursor: 'pointer',
              transition: 'transform .12s ease, background .12s ease',
            }}>
            {Number(sec).toFixed(1)}s
          </button>
        ))}
        {markers.length > shown.length && (
          <div style={{
            height: 31,
            minWidth: 54,
            padding: '0 10px',
            borderRadius: 999,
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            background: 'var(--c-s2)',
            color: 'var(--c-text-2)',
            fontSize: 12,
            fontWeight: 900,
          }}>+{markers.length - shown.length}</div>
        )}
      </div>
      <div style={{
        marginTop: 9,
        height: 4,
        borderRadius: 999,
        background: 'var(--c-s2)',
        position: 'relative',
        overflow: 'hidden',
      }}>
        {markers.map((sec, index) => (
          <span key={`${sec}-bar-${index}`} style={{
            position: 'absolute',
            top: 0,
            bottom: 0,
            left: `${Math.max(0, Math.min(100, (sec / Math.max(duration, 1)) * 100))}%`,
            width: 10,
            transform: 'translateX(-50%)',
            borderRadius: 999,
            background: 'var(--c-danger)',
          }}/>
        ))}
      </div>
    </div>
  );
}

function ConfidenceDetailCard({ items }) {
  return (

/* ══════════════════════════════════════════════════════════════
   STEP · RECORDS — full archive of past measurements with a few
   different lenses. Spec: tapping the bottom-tab 기록 brings the
   user here; they can scan all past sessions, filter by signal,
   and kick off a fresh measurement without going back to home.
   ══════════════════════════════════════════════════════════════ */
function RecordsScreen({ visible, cards, onBack, onStart, onCardClick, onTabClick }) {
  // Status-based filters — uses the same signal vocabulary as the rest
  // of the app so the user isn't asked to learn a new taxonomy here.
  const [filter, setFilter] = useState('all');

  const counts = useMemo(() => ({
    all: cards.length,
    success: cards.filter(c => c.status === 'success').length,
    warn: cards.filter(c => c.status === 'warn').length,
  }), [cards]);

  const filtered = useMemo(() => {
    if (filter === 'all') return cards;
    return cards.filter(c => c.status === filter);
  }, [filter, cards]);

  const avg = cards.length
    ? Math.round(cards.reduce((s, c) => s + c.score, 0) / cards.length)
    : 0;
  // Trend = recent-3 average vs overall — small chip beside the avg.
  const recent3 = cards.slice(0, Math.min(3, cards.length));
  const recentAvg = recent3.length
    ? Math.round(recent3.reduce((s, c) => s + c.score, 0) / recent3.length)
    : 0;
  const trend = recentAvg - avg;

  return (
    <div style={{
      position: 'absolute', inset: 0,
      background: 'var(--c-bg)',
      opacity: visible ? 1 : 0,
      transition: 'opacity .3s ease-out',
      pointerEvents: visible ? 'auto' : 'none',

          <ChevronLeft size={20} color="var(--c-text-2)"/>
          홈

          margin: 0, fontSize: 26, fontWeight: 700, letterSpacing: '-0.02em',

        <div style={{
          marginTop: 6, fontSize: 14, fontWeight: 500,
          color: 'var(--c-text-2)', letterSpacing: '-0.01em',
          display: 'inline-flex', alignItems: 'center', gap: 8,
        }}>
          <span>{cards.length}회 측정 · 평균 {avg}점</span>
          {cards.length >= 3 && trend !== 0 && (
            <span style={{
              display: 'inline-flex', alignItems: 'center', gap: 3,
              padding: '2px 8px', borderRadius: 999,
              background: trend > 0 ? 'var(--c-success-bg)' : 'var(--c-warn-bg)',
              color: trend > 0 ? 'var(--c-success)' : 'var(--c-warn)',
              fontSize: 11, fontWeight: 600, letterSpacing: '-0.01em',
              fontVariantNumeric: 'tabular-nums',
            }}>
              {trend > 0 ? '▲' : '▼'} {Math.abs(trend)}
            </span>

      </div>

      {/* New-measurement CTA card */}
      <div style={{ position: 'absolute', top: 168, left: 24, right: 24 }}>

          width: '100%',

    </div>
  );

/* ══════════════════════════════════════════════════════════════
   App — splash → home → camera → recording → analyze → reveal → result.
   Home owns the recent-measurements list; STEP 5 → 홈 복귀 시
   prepends a fresh card so the carousel grows.
   ══════════════════════════════════════════════════════════════ */
function App() {
  const [screen, setScreen] = useState('splash');
  const [mode, setMode]     = useState('runner');
  const [splashMounted, setSplashMounted] = useState(true);
  const cameraInputRef = useRef(null);
  const galleryInputRef = useRef(null);
  const [uploadSheetOpen, setUploadSheetOpen] = useState(false);
  const [webStatus, setWebStatus] = useState(null);
  const [latestResult, setLatestResult] = useState(null);
  const [analysisProgress, setAnalysisProgress] = useState(0);
  const [analysisStepIdx, setAnalysisStepIdx] = useState(0);
  const [analysisPhase, setAnalysisPhase] = useState('upload');
  const [analysisTitle, setAnalysisTitle] = useState('영상을 전송하고 있어요');
  const [analysisSubtitle, setAnalysisSubtitle] = useState('안전한 분석 서버로 보내는 중');
  const [treadmillSpeed, setTreadmillSpeed] = useState(9.5);

  // Trainer-mode member selection. Persists across mode toggles so flipping
  // runner ↔ trainer doesn’t reset who the trainer was working with.
  const [selectedMemberId, setSelectedMemberId] = useState(MEMBERS[0].id);
  const [pickerOpen, setPickerOpen] = useState(false);
  const member = MEMBERS.find(m => m.id === selectedMemberId) || MEMBERS[0];

  // Recent measurements — seeded with two so the spec's "78점/62점"
  // demo cards are present on first load, and the carousel has
  // somewhere to grow when STEP 5 completes.
  const [cards, setCards] = useState(() => ([
    { id: 1, status: 'success', label: '정상', score: 78, date: '5월 22일' },
    { id: 2, status: 'warn',    label: '주의', score: 62, date: '5월 19일' },
    { id: 3, status: 'success', label: '정상', score: 81, date: '5월 15일' },
  ]));

  // For result screen — danger count of the most recently-captured clip.
  // While the camera/recording phases are running we count the EVENTS in
  // DANGER_TIMES; once STEP 5 completes we read this back to author the
  // new card's score/status.
  const [lastDanger, setLastDanger] = useState(DANGER_TIMES.length);
  const [selectedCard, setSelectedCard] = useState(null);

  // Splash → home auto-transition (interval-polled to dodge throttling).
  useEffect(() => {
    if (screen !== 'splash') return;
    const start = performance.now();
    const id = setInterval(() => {
      const e = performance.now() - start;
      if (e >= 1500) { setScreen('home'); }
      if (e >= 1950) { setSplashMounted(false); clearInterval(id); }
    }, 80);
    return () => clearInterval(id);
  }, [screen]);

  useEffect(() => {
    const preview = new URLSearchParams(window.location.search).get('preview');
    if (preview !== 'loading') return;
    setAnalysisProgress(88);
    setAnalysisStepIdx(3);
    setAnalysisPhase('analyze');
    setAnalysisTitle('8초 영상을 분석하고 있어요');
    setAnalysisSubtitle('3대 핵심 지표를 계산하는 중');
    setScreen('analyze');
    setSplashMounted(false);
  }, []);

  useEffect(() => {
    const analysisId = new URLSearchParams(window.location.search).get('analysis');
    if (!analysisId) return;
    let alive = true;
    const loadExistingAnalysis = async () => {
      try {
        setWebStatus({ tone: 'primary', title: '결과 불러오는 중', message: `분석 ID ${analysisId.slice(0, 8)} 결과를 앱 화면에 연결하고 있어요.` });
        const res = await fetch(`${API_ORIGIN}/api/analysis/${analysisId}`, { cache: 'no-store' });
        const json = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(json?.detail?.message_ko || '분석 결과를 불러오지 못했어요.');
        if (!alive) return;
        if (json.status !== 'completed') {
          setWebStatus({ tone: 'primary', title: '아직 분석 중', message: '잠시 후 새로고침하면 결과 화면으로 바로 이동합니다.' });
          setScreen('home');
          setSplashMounted(false);
          return;
        }
        const danger = json?.analysis_result?.summary?.danger_count ?? 0;
        const enriched = {
          ...json,
          original_video_url: json.original_video_url || `/storage/uploads/${analysisId}.mp4`,
          user_metrics: {
            ...(json.user_metrics || {}),
            treadmill_speed_kmh: treadmillSpeed,
          },
        };
        setLatestResult(enriched);
        setLastDanger(danger);
        setSelectedCard(null);
        setScreen('result');
        setSplashMounted(false);
        setWebStatus({ tone: 'success', title: '결과 연결 완료', message: json.coach_message || '실제 분석 결과를 앱 화면에 표시했어요.' });
      } catch (error) {
        if (!alive) return;
        setScreen('home');
        setSplashMounted(false);
        setWebStatus({
          tone: 'danger',
          title: '결과 불러오기 실패',
          message: error?.message || 'FastAPI 서버가 켜져 있는지 확인해주세요.',
        });
      }
    };
    loadExistingAnalysis();
    return () => { alive = false; };
  }, []);

  const startMeasure = () => {
    setPickerOpen(false);
    setUploadSheetOpen(true);
  };
  const goHome       = () => setScreen('home');
  // Bottom-tab router used by every screen with a TabBar.
  const onTabClick = (id) => {
    if (id === 'home')    setScreen('home');
    else if (id === 'records') setScreen('records');
    else if (id === 'capture') startMeasure();
    else if (id === 'profile') setScreen('profile');
  };
  const openNativeCamera = () => {
    setUploadSheetOpen(false);
    cameraInputRef.current?.click();
  };
  const onRecorded   = () => {
    setLatestResult(null);
    setAnalysisProgress(8);
    setAnalysisStepIdx(0);
    setAnalysisPhase('upload');
    setAnalysisTitle('영상을 전송하고 있어요');
    setAnalysisSubtitle('안전한 분석 서버로 보내는 중');
    setLastDanger(DANGER_TIMES.length);
    setScreen('analyze');
  };
  const onAnalyzed   = () => setScreen('reveal');
  const onResultDone = () => setScreen('result');

  const uploadWebVideo = async (file) => {
    if (!file) return;
    setLatestResult(null);
    setSelectedCard(null);
    setAnalysisProgress(8);
    setAnalysisStepIdx(0);
    setAnalysisPhase('upload');
    setAnalysisTitle('영상을 전송하고 있어요');
    setAnalysisSubtitle(`${file.name} 파일을 서버로 보내는 중`);
    setScreen('analyze');
    setWebStatus({ tone: 'primary', title: '영상 업로드 중', message: `${file.name} 파일을 Python 서버로 보내고 있어요.` });

    try {
      const body = new FormData();
      body.append('video', file);

      const uploadRes = await fetch(`${API_ORIGIN}/api/upload`, {
        method: 'POST',
        body,
      });
      setAnalysisProgress(32);
      const uploadJson = await uploadRes.json().catch(() => ({}));
      if (!uploadRes.ok) {
        const msg = uploadJson?.detail?.message_ko || '영상 업로드가 거부됐어요. 파일 형식, 해상도, FPS, 길이를 확인해주세요.';
        throw new Error(msg);
      }

      const analysisId = uploadJson.analysis_id;
      if (uploadJson.original_video_url) {
        setLatestResult({
          analysis_id: analysisId,
          status: 'processing',
          original_video_url: uploadJson.original_video_url,
          user_metrics: { treadmill_speed_kmh: treadmillSpeed },
        });
      }
      setAnalysisPhase('analyze');
      setAnalysisProgress(42);
      setAnalysisStepIdx(1);
      setAnalysisTitle('8초 영상을 분석하고 있어요');
      setAnalysisSubtitle('33개 관절 좌표를 추출하는 중');
      setWebStatus({ tone: 'primary', title: '분석 시작', message: `분석 ID ${analysisId.slice(0, 8)} · 약 30초 동안 결과를 확인합니다.` });

      for (let i = 0; i < 90; i += 1) {
        await new Promise(resolve => setTimeout(resolve, 1000));
        const pollRes = await fetch(`${API_ORIGIN}/api/analysis/${analysisId}`, { cache: 'no-store' });
        const pollJson = await pollRes.json().catch(() => ({}));
        if (!pollRes.ok) {
          throw new Error(pollJson?.detail?.message_ko || '분석 상태를 확인하지 못했어요.');
        }

        if (pollJson.status === 'completed') {
          const enriched = {
            ...pollJson,
            original_video_url: pollJson.original_video_url || uploadJson.original_video_url || `/storage/uploads/${analysisId}.mp4`,
            user_metrics: {
              ...(pollJson.user_metrics || {}),
              treadmill_speed_kmh: treadmillSpeed,
            },
          };
          const danger = pollJson?.analysis_result?.summary?.danger_count ?? DANGER_TIMES.length;
          setAnalysisProgress(100);
          setAnalysisStepIdx(ANALYZE_STEPS.length);
          setAnalysisTitle('분석이 완료됐어요');
          setAnalysisSubtitle('한국어 코칭 메시지를 정리했어요');
          setLastDanger(danger);
          setLatestResult(enriched);
          setWebStatus({ tone: 'success', title: '실제 분석 완료', message: enriched.coach_message || '결과 화면으로 이동합니다.' });
          setTimeout(() => setScreen('result'), 900);
          return;
        }

        if (pollJson.status === 'failed') {
          throw new Error(pollJson.message_ko || pollJson.error_message_ko || '분석에 실패했어요.');
        }

        const elapsed = pollJson.elapsed_sec ?? i * 3;
        if (pollJson.original_video_url) {
          setLatestResult(prev => ({
            ...(prev || {}),
            ...pollJson,
            user_metrics: {
              ...(prev?.user_metrics || {}),
              ...(pollJson.user_metrics || {}),
              treadmill_speed_kmh: treadmillSpeed,
            },
          }));
        }
        const nextProgress = Math.min(94, 42 + Math.round((elapsed / 35) * 52));
        const nextStep = Math.min(ANALYZE_STEPS.length - 1, Math.max(1, Math.floor((nextProgress - 35) / 14)));
        setAnalysisProgress(nextProgress);
        setAnalysisStepIdx(nextStep);
        setAnalysisSubtitle(ANALYZE_STEPS[nextStep] || '3대 핵심 지표를 계산하는 중');
        setWebStatus({ tone: 'primary', title: '분석 중', message: `MediaPipe Pose 분석 진행 중 · ${elapsed}초 경과` });
      }

      throw new Error('분석 시간이 오래 걸리고 있어요. 잠시 뒤 다시 확인해주세요.');
    } catch (error) {
      setWebStatus({
        tone: 'danger',
        title: '연동 확인 필요',
        message: error?.message || `Python 서버가 켜져 있는지 확인해주세요. 서버 주소는 ${API_ORIGIN} 입니다.`,
      });
    } finally {
      if (cameraInputRef.current) cameraInputRef.current.value = '';
      if (galleryInputRef.current) galleryInputRef.current.value = '';
    }
  };

  // Closing the result returns to home AND prepends a freshly-derived
  // card from the last capture. Score and verdict are computed from
  // the danger count so the card aligns with what the user just saw.
  const finishAndReturn = () => {
    if (selectedCard) {
      setSelectedCard(null);
      setScreen('home');
      return;
    }
    const dangerCount = lastDanger;
    const score = latestResult ? scoreFromAnalysis(latestResult, dangerCount) : Math.max(40, 100 - dangerCount * 9 - 4);
    const status = dangerCount >= 4 ? 'warn' : 'success';
    const label  = dangerCount >= 4 ? '주의' : '정상';
    const date   = new Date().toLocaleDateString('ko-KR', { month: 'long', day: 'numeric' });
    const metricCards = makeMetricCards(latestResult, dangerCount);
    const kneeCard = metricCards.find(card => card.id === 'knee');
    const newCard = {
      id: Date.now(),
      status,
      label,
      score,
      date,
      danger: dangerCount,
      resultData: latestResult,
      speed: getTreadmillSpeed(latestResult) || treadmillSpeed,
      knee: Number.parseInt(kneeCard?.value, 10) || undefined,
    };
    setCards(prev => [newCard, ...prev]);
    setScreen('home');
  };

  // Tapping a recent-card opens STEP 5 (result) for that card,
  // skipping camera/recording. Same screen, different data.
  const openCard = (card) => {
    setSelectedCard(card);
    setLatestResult(card.resultData || null);
    setLastDanger(card.danger ?? (card.status === 'warn' ? 4 : 2));
    setScreen('result');
  };

  return (
    <Stage>
      <PhoneFrame>
        <input
          ref={cameraInputRef}
          type="file"
          accept="video/*"
          capture="environment"
          style={{ display: 'none' }}
          onChange={(e) => {
            setUploadSheetOpen(false);
            uploadWebVideo(e.target.files?.[0]);
          }}
        />
        <input
          ref={galleryInputRef}
          type="file"
          accept="video/mp4,video/quicktime,video/*,.mp4,.mov"
          style={{ display: 'none' }}
          onChange={(e) => {
            setUploadSheetOpen(false);
            uploadWebVideo(e.target.files?.[0]);
          }}
        />
        <HomeScreen
          visible={screen === 'home'}
          mode={mode} setMode={setMode}
          cards={cards}
          member={member}
          onOpenPicker={() => setPickerOpen(true)}
          onMeasureClick={startMeasure}
          onTabClick={onTabClick}
          goResult={openCard}/>

        <RecordsScreen
          visible={screen === 'records'}
          cards={cards}
          onBack={goHome}
          onStart={startMeasure}
          onCardClick={openCard}
          onTabClick={onTabClick}/>

        <ProfileScreen
          visible={screen === 'profile'}
          mode={mode}
          setMode={setMode}
          cards={cards}
          onStart={startMeasure}
          onTabClick={onTabClick}/>

        <CameraScreen
          visible={screen === 'camera'}
          onBack={goHome}
          onRecordedFile={uploadWebVideo}
          onGallery={() => galleryInputRef.current?.click()}
          onFallbackCamera={openNativeCamera}/>

        <RecordingScreen
          visible={screen === 'recording'}
          onDone={onRecorded}/>

        <AnalyzeScreen
          visible={screen === 'analyze'}
          controlled={true}
          progress={analysisProgress}
          stepIndex={analysisStepIdx}
          phase={analysisPhase}
          title={analysisTitle}
          subtitle={analysisSubtitle}
          onDone={onAnalyzed}/>

        <RevealScreen
          visible={screen === 'reveal'}
          danger={lastDanger}
          resultData={latestResult}
          onContinue={onResultDone}
          onBack={finishAndReturn}/>

        <ResultScreen
          visible={screen === 'result'}
          danger={lastDanger}
          confidence={latestResult?.confidence || "high"}
          resultData={latestResult}
          onBack={finishAndReturn}/>

        {splashMounted && <SplashScreen visible={screen === 'splash'}/>}

        {/* Member picker overlay — only meaningful in trainer mode but
            rendered at the App level so the backdrop covers the whole
            phone, not just the home screen content. */}
        <MemberPickerSheet
          open={pickerOpen && mode === 'trainer' && screen === 'home'}
          members={MEMBERS}
          selectedId={selectedMemberId}
          onPick={setSelectedMemberId}
          onClose={() => setPickerOpen(false)}/>
        <UploadChoiceSheet
          open={uploadSheetOpen}
          speed={treadmillSpeed}
          onSpeedChange={setTreadmillSpeed}
          onCamera={() => {
            setPickerOpen(false);
            setUploadSheetOpen(false);
            setScreen('camera');
          }}
          onGallery={() => {
            setPickerOpen(false);
            setUploadSheetOpen(false);
            galleryInputRef.current?.click();
          }}
          onClose={() => setUploadSheetOpen(false)}
        />
        {webStatus && (
          <WebStatusToast
            {...webStatus}
            onClose={() => setWebStatus(null)}
          />
        )}
      </PhoneFrame>
    </Stage>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
